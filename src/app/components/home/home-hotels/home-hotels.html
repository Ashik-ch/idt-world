<section class="max-w-9xl mx-auto p-4 rounded-2xl bg-gradient-to-br from-red-500 to-red-600 text-white">
    <h3 class="text-xl font-semibold mb-1"> <i class="pi pi-building + ' text-2xl mr-3'"></i>
        Hotels and Resorts </h3>
    <p class="text-sm opacity-90">Handpicked Stays for Every Destination</p>

    <div class="flex flex-wrap justify-left gap-4 mt-4">
        <div *ngFor="let dest of destinations" (click)="openDestination(dest)" class="px-3 py-1 text-[11px] rounded-full
                         bg-white/10 backdrop-blur-md text-white cursor-pointer
                         border border-white/20 hover:bg-white/20 transition-all duration-300">
            {{ dest.name }}
        </div>
    </div>
</section>

<!-- BACKDROP -->
<div *ngIf="activeDestination" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-40" (click)="closeModal()">
</div>

<!-- Modal -->
<div *ngIf="activeDestination" class="fixed inset-0 z-50 flex items-center justify-center px-3">
    <div class="relative w-full max-w-3xl max-h-[85vh] 
            rounded-[2rem] border border-white/10 shadow-[0_25px_80px_rgba(153,0,0,0.5)]
            backdrop-blur-2xl p-6 animate-scaleIn transition-all duration-500
            bg-[#7a0000]" [ngStyle]="{
        'background': 'linear-gradient(135deg, #4a0000 0%, #8b0000 50%, #b21818 100%)',
        'box-shadow': 'inset 0 0 100px rgba(0,0,0,0.3), 0 25px 80px rgba(0,0,0,0.5)'
     }" (click)="$event.stopPropagation()">
        <div class="absolute -top-20 -right-20 w-64 h-64 bg-red-400/20 blur-[100px] rounded-full pointer-events-none">
        </div>
        <div class="flex items-center justify-between mb-6 pb-4 border-b border-white/10">
            <div class="flex flex-col">
                <span class="text-[10px] uppercase tracking-[0.3em] text-red-300 font-bold mb-1">Destination
                    Details</span>
                <h3 class="text-2xl md:text-4xl font-bold text-white tracking-tight drop-shadow-md">
                    {{ activeDestination.name }}
                </h3>
            </div>
            <button (click)="closeModal()" class="group w-10 h-10 rounded-xl bg-white/10 border border-white/20 
                       flex items-center justify-center transition-all duration-300
                       hover:bg-red-600 hover:border-red-500 hover:rotate-90">
                <span class="text-white group-hover:scale-125 transition-transform text-xl">✕</span>
            </button>
        </div>

        <!-- Categories -->
        <div class="grid md:grid-cols-4 gap-2">
            <div *ngFor="let cat of categoryKeys(activeDestination.categories)"
                class="border border-red-500/50 rounded-xl p-4">

                <h4 class=" font-semibold mb-2 text-white tracking-wide">{{ cat }}</h4>

                <div class="space-y-1">
                    <div *ngFor="let resort of activeDestination.categories[cat]">

                        <div (click)="toggleResort(resort)" class="cursor-pointer px-3 py-2 rounded-lg
                     bg-black/40 hover:bg-red-500/20 hover:border-white  hover:border-2 transition text-white
                     flex justify-between items-center">
                            <span class="text-sm">{{ resort.name }}</span>
                            <span class="text-red-400 text-xs">
                                {{ openResort === resort ? '−' : '+' }}
                            </span>
                        </div>

                        <!-- Accordion -->
                        <div *ngIf="openResort === resort"
                            class="mt-2 p-3 rounded-lg bg-black/60 border border-red-500/20">
                            <img [src]="resort.image" class="w-full h-40 object-cover rounded-lg mb-2">
                            <p class="text-xs text-gray-300"> {{ resort.desc }} </p>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
