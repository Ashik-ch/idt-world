<app-home-features></app-home-features>


<div class="relative bg-[#0f0f0f] overflow-hidden flex items-center group">

    <div class="absolute inset-0">
        <div
            class="absolute inset-0 bg-cover bg-center scale-105 group-hover:scale-110 transition-transform duration-1000 opacity-90]">
        </div>
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_70%_50%,rgba(220,38,38,0.3),transparent)]"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-red-600 via-[red-600]/80 to-transparent"></div>
    </div>

    <div class="absolute top-20 left-[-10%] w-72 h-72 bg-red-600/80 blur-[120px] rounded-full"></div>
    <div class="relative container mx-auto px-6 md:px-12 z-10">
        <div class="flex flex-col lg:flex-row items-center gap-16">
            <div class="flex-1 text-center lg:text-left relative py-10 px-6 mt-10 lg:mt-0">

                <div
                    class="absolute inset-y-0 -left-0 w-full lg:w-[110%] bg-white/100 backdrop-blur-xl rounded-[2.5rem] border border-white/20 shadow-2xl -z-10  lg:block">
                    <div class="absolute left-0 top-1/4 bottom-1/4 w-1.5 bg-red-600 rounded-r-full"></div>
                </div>

                <!-- <div class="absolute inset-0 bg-white/10 backdrop-blur-md rounded-3xl lg:hidden -z-10"></div> -->

                <div class="lg:pl-10 space-y-6">

                    <div
                        class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-red-600 shadow-sm border border-red-100 text-white text-xs font-bold uppercase tracking-widest">
                        <span class="w-2 h-2 rounded-full bg-white"></span>
                        Premium Travel Experience
                    </div>

                    <h1 class="text-xl md:text-2xl lg:text-3xl font-bold text-red-600 leading-tight">
                        With <span class="text-red-500 drop-shadow-[0_2px_10px_rgba(220,38,38,0.3)]">IDT</span>,
                    </h1>

                    <om-typewriter class="text-md md:text-2xl font-medium tracking-wide text-red-600" [words]="[
                'Every destination is a fresh story',
                'Experience The World In High Definition',
                'Amplify life\'s most meaningful moments',
                'Enjoy bespoke journeys of luxury',
                'Write your unscripted story moments'
              ]">
                    </om-typewriter>

                    <p
                        class="text-gray-800/90 text-base md:text-lg max-w-xl mx-auto lg:mx-0 leading-relaxed font-light">
                        Redefining luxury travel. Explore our curated
                        <span class="text-red-600 font-semibold border-b-2 border-red-500/60 pb-0.5">
                            inbound</span> and
                        <span class="text-red-600 font-semibold border-b-2 border-red-500/60 pb-0.5">outbound
                        </span>packages designed for those who demand the extraordinary.
                    </p>

                    <div class="flex flex-wrap gap-5 justify-center lg:justify-start pt-0 mt:pt-8 ">
                        <a routerLink="/inbound" class="px-6 py-3 rounded-full
                                                     bg-gradient-to-r from-red-500 to-pink-500
                                                     text-white font-semibold tracking-wide
                                                     shadow-[0_10px_30px_rgba(255,0,80,0.25)]
                                                     hover:scale-105 transition-all">
                            Inbound Packages
                        </a>
                        <a routerLink="/outbound" class="px-6 py-3 rounded-full
                                     border border-red-400/40
                                     text-red-500 font-semibold tracking-wide
                                     bg-white backdrop-blur-md
                                     hover:bg-red-50 hover:border-red-500
                                     transition-all">

                            Outbound Tours
                        </a>

                    </div>
                </div>
            </div>

            <div class="flex-1 relative group">
                <div class="absolute inset-0 border-[20px] border-red-600/5 rounded-full animate-spin-slow">
                </div>

                <img src="assets/images/bg23.png" alt="Travel Banner"
                    class="relative z-10 w-full max-w-sm lg:max-w-md justify-self-center transform transition-transform duration-700 group-hover:scale-105 drop-shadow-[0_0_50px_rgba(220,38,38,0.3)]">


            </div>
        </div>
    </div>
</div>
